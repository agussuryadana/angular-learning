<mat-form-field>
    <input matInput (keyup)="applyFilter($event)" placeholder="seacrh" >
</mat-form-field>

<div class="container">
    @for (product of products$ | async; track product.id) {
        <mat-card class="product-card" appearance="outlined" (click)="addToCart(product)">
        <img mat-card-image src="https://material.angular.dev/assets/img/examples/shiba2.jpg">
        <mat-card-content>
            <mat-card-title>{{ product.name }}</mat-card-title>
            <mat-card-subtitle>
          {{ product.price | currency:'IDR' }}
            </mat-card-subtitle>
        </mat-card-content>
    </mat-card>
    }
</div>
