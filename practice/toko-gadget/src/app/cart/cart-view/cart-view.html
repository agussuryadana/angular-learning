<div class="container-sm">
    <h1>Your Cart</h1>

    <mat-card>

        <mat-list>
            @for (item of cartItems$ | async; track item.id){
            <mat-list-item>
                <span matListItemTitle>{{ item.name }}</span>
                <span matListItemLine>{{ item.price | currency:'IDR' }}</span>
            </mat-list-item>
            }
            <mat-list-item>
                <span class="price" matListItemTitle>Total (IDR)</span>
                <span class="price" matListItemLine>{{ total$ | async | currency:'IDR' }}</span>
            </mat-list-item>
            <mat-list-item  class="text-right">
                <button mat-flat-button>Clear</button>
            </mat-list-item>
            <mat-list-item class="text-right">
                <button mat-raised-button color="accent">Checkout</button>
            </mat-list-item>
        </mat-list>
    </mat-card>
</div>
