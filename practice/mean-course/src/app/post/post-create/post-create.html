<mat-card>
    <form (submit)="onAddPost()">
        <mat-form-field>
            <input matInput type="text" name="title" ngModel>
        </mat-form-field>
        <mat-form-field>
            <textarea matInput rows="4" name="content" ngModel></textarea>
        </mat-form-field>
        <div class="actions">
            <button matButton="filled" type="submit">save
            </button>
        </div>
    </form>
</mat-card>
